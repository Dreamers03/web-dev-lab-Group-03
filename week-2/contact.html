<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - My Student Portal</title>
</head>
<body>

    <h1>Contact Page</h1>

    <p><b>Navigation:</b> 
        <a href="index.html">Home</a> | 
        <a href="timetable.html">Timetable</a> | 
        <a href="contact.html">Contact</a>
    </p>

    <h2>1. Basic Contact Form</h2>
    <form action="" method="post">
        <p>Name: <input type="text" name="name" required></p>
        <p>Email: <input type="email" name="email" required></p>
        <p>Message:<br>
            <textarea name="message" rows="5" cols="40" required></textarea>
        </p>
        <input type="submit" value="Send Message">
    </form>

    <hr>

    <h2>2. Student Registration Form (Inside Table)</h2>
    <form action="" method="post">
        <table border="3" cellpadding="8" cellspacing="0">
            <tr>
                <td>Full Name:</td>
                <td><input type="text" name="fullname" required></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" name="email" required></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" name="password" required></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male" required> Male &nbsp;&nbsp;
                    <input type="radio" name="gender" value="female"> Female
                </td>
            </tr>
            <tr>
                <td>Courses:</td>
                <td>
                    <input type="checkbox" name="courses" value="html"> HTML <br>
                    <input type="checkbox" name="courses" value="css"> CSS <br>
                    <input type="checkbox" name="courses" value="javascript"> JavaScript
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
